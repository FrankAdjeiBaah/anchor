<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anchor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Anchor</h1>
    <p class="tagline">Your daily brief. Nothing more.</p>
  </header>

  <main>
    <section id="ghana" class="category">
      <h2>Ghana</h2>
      <div class="feed" data-feed="ghana"></div>
    </section>

    <section id="uk" class="category">
      <h2>UK</h2>
      <div class="feed" data-feed="uk"></div>
    </section>

    <section id="world" class="category">
      <h2>World</h2>
      <div class="feed" data-feed="world"></div>
    </section>

    <section id="arsenal" class="category">
      <h2>Arsenal</h2>
      <div class="feed" data-feed="arsenal"></div>
    </section>

    <section id="tech" class="category">
      <h2>Tech</h2>
      <div class="feed" data-feed="tech"></div>
    </section>

    <section id="faith" class="category">
      <h2>Faith</h2>
      <div class="feed" data-feed="faith"></div>
    </section>
  </main>

  <script src="feeds.js"></script>
  <script src="app.js"></script>
</body>
</html>
